# Render Blueprint - https://render.com/docs/blueprint-spec
# Deploy with: Connect GitHub repo to Render, it auto-detects this file

services:
  - type: web
    name: document-intelligence-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Groq (free cloud LLM) - Get your key at https://console.groq.com
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false  # Set manually in Render dashboard (secret)
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      # Data paths (Render provides persistent disk on paid plans)
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: CHROMA_PATH
        value: /app/chroma_db
      - key: SQLITE_DB_PATH
        value: /app/workspace.db
